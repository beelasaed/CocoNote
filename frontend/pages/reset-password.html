<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CocoNote - Reset Password</title>
    <link rel="stylesheet" href="../assets/css/variable.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>

<body class="login-body">
    <div class="auth-card animate-up">
        <h1 class="brand-title">🥥 CocoNote</h1>
        <h2 class="welcome-text">Reset Password</h2>
        <p class="subtitle">Enter the token sent to your email</p>

        <p id="message" style="text-align: center; display: none; margin-bottom: 1rem; font-weight: bold;"></p>

        <form id="resetForm">
            <div class="form-group">
                <label>Reset Token (6-Digits)</label>
                <input type="text" id="token" placeholder="123456" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">Reset Password</button>
        </form>

        <p class="subtitle" style="margin-top: 2rem;">
            Wait, I remembered it! <a href="login.html" class="link-gold">Back to Login</a>
        </p>
    </div>

    <script src="../screens/reset-password.js"></script>
</body>

</html>
