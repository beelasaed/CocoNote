<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CocoNote - Forgot Password</title>
    <link rel="stylesheet" href="../assets/css/variable.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>

<body class="login-body">
    <div class="auth-card animate-up">
        <h1 class="brand-title">🥥 CocoNote</h1>
        <h2 class="welcome-text">Forgot Password</h2>
        <p class="subtitle">Enter your email to receive a reset token</p>

        <div id="message" class="alert-message alert-error"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label>IUT Email</label>
                <input type="email" id="email" placeholder="your.name@iut-dhaka.edu" required>
            </div>
            <button type="submit" class="auth-btn">Send Reset Token</button>
        </form>

        <p class="subtitle" style="margin-top: 2rem;">
            Remembered your password? <a href="login.html" class="link-gold">Back to Login</a>
        </p>
    </div>

    <script src="../screens/forgot-password.js"></script>
</body>

</html>
